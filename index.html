<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.S. Baby Names Explorer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>U.S. Baby Names Explorer</h1>
        <p>Popularity trends from 1880 to 2024 &mdash; data from the Social Security Administration</p>
    </header>

    <div class="controls">
        <div class="control-group">
            <label>Search Name</label>
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Type a name..." autocomplete="off">
                <div class="typeahead-dropdown hidden" id="typeahead-dropdown"></div>
            </div>
        </div>

        <div class="control-group">
            <label>Gender</label>
            <div class="gender-buttons">
                <button class="gender-btn active" data-gender="both">Both</button>
                <button class="gender-btn" data-gender="F">Female</button>
                <button class="gender-btn" data-gender="M">Male</button>
            </div>
        </div>

        <div class="control-group control-group-slider">
            <label>Year Range</label>
            <div class="range-slider">
                <span class="range-label" id="range-label-start">1880</span>
                <div class="range-track-wrapper">
                    <input type="range" id="year-start" min="1880" max="2024" value="1880">
                    <input type="range" id="year-end" min="1880" max="2024" value="2024">
                    <div class="range-track-fill" id="range-track-fill"></div>
                </div>
                <span class="range-label" id="range-label-end">2024</span>
            </div>
        </div>
    </div>

    <!-- Name Detail Section -->
    <div class="section hidden" id="name-detail-section">
        <div class="section-header">
            <h2 id="name-detail-title">Name Detail</h2>
        </div>
        <div class="charts-row">
            <div class="chart-container">
                <div class="chart-title">Count per Year</div>
                <div id="count-chart"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">Rank per Year</div>
                <div id="rank-chart"></div>
            </div>
        </div>
    </div>

    <!-- Top Names Section -->
    <div class="section" id="top-names-section">
        <div class="section-header">
            <h2>Top Names</h2>
            <div class="top-controls">
                <select id="top-year-select"></select>
                <button id="range-mode-btn">Use Date Range Above</button>
            </div>
        </div>
        <div class="charts-row" id="top-charts-row">
            <div class="chart-container" id="top-female-container">
                <div class="chart-title">Top Female Names</div>
                <div id="top-female-chart"></div>
            </div>
            <div class="chart-container" id="top-male-container">
                <div class="chart-title">Top Male Names</div>
                <div id="top-male-chart"></div>
            </div>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
