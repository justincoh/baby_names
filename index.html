<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.S. Baby Names Explorer</title>
    <meta name="description" content="US Baby Names - Explore 144 years of naming trends across 372 million records. Data from the Social Security Administration">
    <meta property="og:title" content="US Baby Names">
    <meta property="og:description" content="Explore 144 years of naming trends across 372 million records. Data from the Social Security Administration">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://us-baby-names.com">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="US Baby Names">
    <meta name="twitter:description" content="Explore 144 years of naming trends across 372 million records. Data from the Social Security Administration">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="0a6c5984-4210-4c14-8173-b62678f9be5e"></script>
</head>
<body>
    <div class="page-grain"></div>

    <header>
        <p class="header-eyebrow">Social Security Administration &mdash; 1880 to 2024</p>
        <h1>US Baby Names</h1>
        <p class="header-sub">Explore 144 years of naming trends across 372 million records</p>
    </header>

    <div class="controls">
        <div class="control-group">
            <label>Search Name</label>
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="12.5" y1="12.5" x2="17" y2="17"/></svg>
                <input type="text" id="search-input" placeholder="Try Mary, James, Luna..." autocomplete="off">
                <div class="typeahead-dropdown hidden" id="typeahead-dropdown"></div>
            </div>
        </div>

        <div class="control-group control-group-slider">
            <label>Year Range</label>
            <div class="range-slider">
                <span class="range-label" id="range-label-start">1880</span>
                <div class="range-track-wrapper">
                    <input type="range" id="year-start" min="1880" max="2024" value="1880">
                    <input type="range" id="year-end" min="1880" max="2024" value="2024">
                    <div class="range-track-fill" id="range-track-fill"></div>
                </div>
                <span class="range-label" id="range-label-end">2024</span>
            </div>
        </div>
    </div>

    <!-- Name Detail Section -->
    <div class="section hidden" id="name-detail-section">
        <div class="section-header">
            <h2 id="name-detail-title">Name Detail</h2>
        </div>
        <div class="charts-row">
            <div class="chart-container">
                <div class="chart-title">Count per Year</div>
                <div id="count-chart"></div>
            </div>
            <div class="chart-container">
                <div class="chart-title">Rank per Year</div>
                <div id="rank-chart"></div>
            </div>
        </div>
    </div>

    <!-- Top Names Section -->
    <div class="section" id="top-names-section">
        <div class="section-header">
            <h2>Top Names</h2>
            <div class="top-controls">
                <select id="top-year-select"></select>
                <button id="range-mode-btn">Use Date Range Above</button>
                <span class="range-mode-label hidden" id="range-mode-label"></span>
            </div>
        </div>
        <div class="charts-row" id="top-charts-row">
            <div class="chart-container" id="top-female-container">
                <div class="chart-title">Top Female Names</div>
                <div id="top-female-chart"></div>
            </div>
            <div class="chart-container" id="top-male-container">
                <div class="chart-title">Top Male Names</div>
                <div id="top-male-chart"></div>
            </div>
        </div>
    </div>

    <footer>
        <p><a target="_blank" href="https://www.ssa.gov/oact/babynames/limits.html">Data from the U.S. Social Security Administration.</a></p>
    </footer>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
